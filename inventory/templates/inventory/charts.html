{% extends 'inventory/base.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-primary my-3 mx-4">&larr; Go Back</a>
</head>
<body>
<div class="col-md-4 col-1 mx-auto mt-5">

    <canvas id="statusChart" width="100" height="400"></canvas>
    <script>
        var ctx = document.getElementById('statusChart').getContext('2d');
        var statusChart = new Chart(ctx, {
            type: 'pie', // You can use 'bar', 'line', etc.
            data: {
                labels: {{ status_labels|safe }}, // Dynamic labels from context
                datasets: [{
                    data: {{ status_totals|safe }}, // Dynamic totals from context
                    backgroundColor: [
                        '#03fc2c', '#47abd6', '#d1bc34', '#a89274',
                        '#b58353', '#757c80', '#f21818'
                    ],
                    borderColor: [
                        '#03fc2c', '#47abd6', '#d1bc34', '#a89274',
                        '#b58353', '#757c80', '#f21818'
                    ],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(tooltipItem) {
                                return tooltipItem.label + ': ' + tooltipItem.raw + ' items';
                            }
                        }
                    }
                }
            }
        });
    </script>

</div>
</body>
</html>
{% endblock content %}

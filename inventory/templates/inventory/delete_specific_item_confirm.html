<!-- delete_specific_item_confirm.html -->
{% extends 'inventory/base.html' %}

{% block content %}
  <h2 class="text-danger">Are you sure you want to delete this specific item?</h2>

  <p ><strong >Specific Item Label:</strong> {{ specific_item.label }}</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger ">Yes, Delete</button>
    <a href="{% url 'item-detail' pk=specific_item.inventory_item.pk %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}

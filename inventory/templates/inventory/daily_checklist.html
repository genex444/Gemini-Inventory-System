{% extends 'inventory/base.html' %}

{% block content %}
<div class="container my-5">

    <form method="POST" action="{% url 'daily_checklist' %}">
        {% csrf_token %}

        <div class="card shadow-sm border-0 mb-4 checklist-header">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <label for="studioSelect" class="form-label fw-bold me-2 mb-0">STUDIO:</label>
                    <select class="form-select form-select-lg w-auto" id="studioSelect" name="studio">
                        <option value="Las Vegas" selected>Las Vegas</option>
                        <option value="Abudhabi">Abudhabi</option>
                        <option value="Monaco">Monaco</option>
                        <option value="Suzuka">Suzuka</option>
                        <option value="Philippines">Philippines</option>
                        <option value="Philippines">Plinko</option>
                    </select>
                </div>
                <h4 class="text-center text-uppercase fw-bold mb-0 mx-3 flex-grow-1">
                    Checklist Everyday / Daily Maintenance
                </h4>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered table-striped align-middle mb-0">
                        <thead class="table-dark text-uppercase text-center">
                            <tr>
                                <th style="width: 15%;">Equipments</th>
                                <th style="width: 15%;">Checked By:</th>
                                <th style="width: 10%;">Time</th>
                                <th style="width: 10%;">Date</th>
                                <th style="width: 15%;">Status</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in equipments %}
                            <tr>
                                <td class="fw-bold">
                                    {{ item }}
                                    <input type="hidden" name="equipment_name" value="{{ item }}">
                                </td>
                                <td>
                                    <input type="text" class="form-control"
                                           name="checked_by_{{ forloop.counter }}"
                                           value="{{ request.user.username }}" readonly>
                                </td>
                                <td>
                                    <input type="time" class="form-control"
                                           name="time_{{ forloop.counter }}"
                                           value="{% if item == 'START GATE' %}04:00{% else %}08:00{% endif %}">
                                </td>
                                <td>
                                    <input type="date" class="form-control"
                                           name="date_{{ forloop.counter }}"
                                           value="{{ current_date }}">
                                </td>
                                <td>
                                    <select class="form-select" name="status_{{ forloop.counter }}">
                                        <option value="" selected>Select Status...</option>
                                        <option value="Good">Good</option>
                                        <option value="Not Good">Not Good</option>
                                    </select>
                                </td>
                                <td>
                                    <select name="remarks_select_{{ forloop.counter }}" class="form-select"
                                            onchange="toggleRemarksInput(this, '{{ forloop.counter }}')">
                                        <option value="">-- Select Maintenance Type --</option>
                                        <option value="Daily Maintenance">Daily Maintenance</option>
                                        <option value="System Maintenance">System Maintenance</option>
                                        <option value="Emergency Maintenance">Emergency Maintenance</option>
                                        <option value="Others">Others</option>
                                    </select>

                                    <input type="text" class="form-control mt-2"
                                           name="remarks_{{ forloop.counter }}"
                                           id="remarks_input_{{ forloop.counter }}"
                                           placeholder="Add remarks..."
                                           style="display:none;">
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-send btn-lg me-2">SEND</button>
            <button type="reset" class="btn btn-clear btn-lg">CLEAR</button>
        </div>
    </form>
</div>

<style>
    .checklist-header {
        background-color: #ddebf7;
        border: 2px solid #5b9bd5 !important;
    }
    .checklist-header h2 {
        color: #2f5496;
    }
    .btn-send {
        background-color: #c5e0b4;
        border: 2px solid #a9d18e;
        color: black;
        font-weight: bold;
        padding: 10px 40px;
    }
    .btn-send:hover {
        background-color: #a9d18e;
        border-color: #8dbd6c;
    }
    .btn-clear {
        background-color: #f8cbad;
        border: 2px solid #f4b183;
        color: black;
        font-weight: bold;
        padding: 10px 40px;
    }
    .btn-clear:hover {
        background-color: #f4b183;
        border-color: #f2a26c;
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.querySelector("form");
    const clearBtn = document.querySelector(".btn-clear");
    const studioSelect = document.getElementById("studioSelect");
    const formCache = {};

    // ✅ Fixed toggleRemarksInput
    window.toggleRemarksInput = function(selectElem, index) {
        const input = document.getElementById(`remarks_input_${index}`);
        console.log("Selected:", selectElem.value);

        if (selectElem.value === "Others") {
            input.style.display = "block";
            input.required = true;
            input.value = "";
            input.removeAttribute("readonly");
        } else {
            input.style.display = "none";
            input.required = false;
            input.value = selectElem.value;
            input.setAttribute("readonly", true);
        }
    };

    // ✅ Reset form
    function resetForm() {
        form.reset();
        document.querySelectorAll("[id^='remarks_input_']").forEach(input => {
            input.style.display = "none";
            input.required = false;
            input.value = "";
            input.removeAttribute("readonly");
        });

        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const currentDate = `${yyyy}-${mm}-${dd}`;
        document.querySelectorAll("input[type='date']").forEach(d => d.value = currentDate);
    }

    if (clearBtn) {
        clearBtn.addEventListener("click", function(e) {
            e.preventDefault();
            resetForm();
        });
    }

    // ✅ Optional: per-studio form cache
    studioSelect.addEventListener("change", function() {
        const newStudio = studioSelect.value;
        const prevStudio = studioSelect.dataset.prevStudio;
        if (prevStudio) formCache[prevStudio] = Object.fromEntries(new FormData(form).entries());

        if (formCache[newStudio]) {
            for (const [name, value] of Object.entries(formCache[newStudio])) {
                const field = form.querySelector(`[name='${name}']`);
                if (field) field.value = value;
            }
        } else {
            resetForm();
        }
        studioSelect.dataset.prevStudio = newStudio;
    });
});


document.addEventListener("DOMContentLoaded", function() {
    // Apply color immediately and on change
    document.querySelectorAll("select[name^='status_']").forEach(select => {
        function updateColor() {
            if (select.value === "Good") {
                select.style.backgroundColor = "#d4edda";  // light green
                select.style.color = "#155724";
            } else if (select.value === "Not Good") {
                select.style.backgroundColor = "#f8d7da";  // light red
                select.style.color = "#721c24";
            } else {
                select.style.backgroundColor = "";
                select.style.color = "";
            }
        }

        // Set color when the page loads and when user changes value
        updateColor();
        select.addEventListener("change", updateColor);
    });
});
</script>

{% endblock content %}

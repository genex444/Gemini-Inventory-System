{% extends "inventory/base.html" %}
{% load static %}

{% block title %}Looker Studio Dashboard{% endblock %}

{% block content %}
<div class="container-fluid mt-3">
    <!-- Page Title -->
    <div class="row mb-3">
        <div class="col">
        </div>
    </div>

    <!-- Responsive Iframe -->
    <div class="iframe-container" style="position: relative; width: 100%; height: 80vh;">
        <iframe
            src="https://lookerstudio.google.com/embed/u/0/reporting/b0ceac4c-3bcf-4fc5-b32f-b4a92dde3235/page/p_70b7pn17od"
            style="position: absolute; top:0; left:0; width:100%; height:100%; border:none;"
            allowfullscreen
            loading="lazy">
        </iframe>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Optional: Highlight navbar link for dashboard
    document.addEventListener("DOMContentLoaded", function() {
        const dashboardLink = document.querySelector('a.nav-link[href="/dashboard/"]');
        if (dashboardLink) {
            dashboardLink.classList.add('active');
        }
    });
</script>
{% endblock %}

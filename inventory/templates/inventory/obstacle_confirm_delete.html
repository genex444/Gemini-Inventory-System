{% extends 'inventory/base.html' %}

{% block content %}
<div class="container mt-5">
    <h3>Confirm Delete</h3>
    <p>Are you sure you want to delete "<strong>{{ object.filename }}</strong>"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'obstacle-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
